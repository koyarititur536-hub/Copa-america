<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Copa América Full Auto Tournament</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

input,button,select{
  padding:4px;
  margin:3px;
  border-radius:4px;
  font-size:12px;
}

input{
  width:28px;
  text-align:center;
}

.group{
  background:#1e293b;
  margin:8px;
  padding:8px;
  border-radius:8px;
}

.matchRow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin:6px 0;
  font-size:12px;
}

.playerCard{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:70px;
}

.playerCard img{
  width:26px;
  height:18px;
  border-radius:3px;
}

.playerName{
  font-size:9px;
  opacity:0.9;
  margin-top:2px;
}

.locked{
  opacity:0.5;
  pointer-events:none;
}

.good{background:#16a34a;}
</style>
</head>

<body>

<h2>🏆 Copa América FULL SYSTEM</h2>

<input id="name" placeholder="Player name">
<button onclick="register()">Register</button>

<p id="count">0 / 16</p>

<select id="country"></select>

<hr>

<h3 id="md">Matchday 0</h3>
<div id="matches"></div>

<button onclick="nextDay()">Next Matchday</button>

<hr>

<button onclick="generateQuarterFinals()">🏆 Generate Quarter Finals</button>

<hr>

<table id="table"></table>

<h2>⚔️ Knockout</h2>
<div id="ko"></div>

<script>

/* ======================
   COUNTRIES
====================== */
let countries=[
{n:"Argentina",c:"ar"},{n:"Brazil",c:"br"},
{n:"Uruguay",c:"uy"},{n:"Colombia",c:"co"},
{n:"Chile",c:"cl"},{n:"Peru",c:"pe"},
{n:"Ecuador",c:"ec"},{n:"Bolivia",c:"bo"},
{n:"Paraguay",c:"py"},{n:"Venezuela",c:"ve"},
{n:"USA",c:"us"},{n:"Mexico",c:"mx"},
{n:"Canada",c:"ca"},{n:"Costa Rica",c:"cr"},
{n:"Panama",c:"pa"},{n:"Jamaica",c:"jm"}
];

let players=[];
let groups={A:[],B:[],C:[],D:[]};
let results={};
let md=0;

let playedMatches={};

let qfMatches=[];
let sfMatches=[];
let finalMatch=[];
let sfWinners=[];
let finalWinners=[];

let select=document.getElementById("country");

/* ======================
   LOAD COUNTRIES
====================== */
function loadCountries(){
  select.innerHTML="";
  countries.forEach((c,i)=>{
    select.innerHTML+=`<option value="${i}">${c.n}</option>`;
  });
}
loadCountries();

/* ======================
   REGISTER
====================== */
function register(){
  let name=document.getElementById("name").value.trim();
  if(!name) return;

  let i=parseInt(select.value);
  let c=countries[i];

  players.push({name,country:c.n,code:c.c});

  countries.splice(i,1);

  document.getElementById("name").value="";
  document.getElementById("count").innerText=players.length+" / 16";

  loadCountries();
  select.value=0;

  if(players.length===16){
    assignGroups();
  }
}

/* ======================
   GROUPS
====================== */
function assignGroups(){
  let keys=["A","B","C","D"];
  let i=0;

  players.forEach(p=>{
    groups[keys[i]].push(p);
    i=(i+1)%4;
  });

  initResults();
  md=0;
  renderMatches();
}

/* ======================
   INIT RESULTS
====================== */
function initResults(){
  for(let g in groups){
    results[g]={};
    groups[g].forEach(p=>{
      results[g][p.country]={pts:0,gd:0,name:p.name,code:p.code};
    });
  }
}

/* ======================
   MATCH SCHEDULE
====================== */
const schedule=[
[[0,1],[2,3]],
[[0,2],[1,3]],
[[0,3],[1,2]]
];

/* ======================
   MATCH RENDER
====================== */
function renderMatches(){
  let div=document.getElementById("matches");
  div.innerHTML="";

  for(let g in groups){
    let box=`<div class="group"><h3>Group ${g}</h3>`;

    schedule[md].forEach((m,i)=>{
      let a=groups[g][m[0]];
      let b=groups[g][m[1]];
      let id=g+md+i;

      box+=`
        <div class="matchRow">

          <div class="playerCard">
            <img src="https://flagcdn.com/w40/${a.code}.png">
            <div class="playerName">${a.name}</div>
          </div>

          <input id="${id}a">
          -
          <input id="${id}b">

          <div class="playerCard">
            <img src="https://flagcdn.com/w40/${b.code}.png">
            <div class="playerName">${b.name}</div>
          </div>

          <button id="btn${id}" onclick="play('${g}','${a.country}','${b.country}','${id}')">✔</button>

        </div>
      `;
    });

    box+="</div>";
    div.innerHTML+=box;
  }

  document.getElementById("md").innerText="Matchday "+(md+1);
}

/* ======================
   PLAY MATCH
====================== */
function play(g,a,b,id){

  if(playedMatches[id]) return;

  let x=parseInt(document.getElementById(id+"a").value);
  let y=parseInt(document.getElementById(id+"b").value);

  if(isNaN(x)||isNaN(y)) return;

  results[g][a].gd += x - y;
  results[g][b].gd += y - x;

  if(x>y) results[g][a].pts+=3;
  else if(y>x) results[g][b].pts+=3;
  else{
    results[g][a].pts+=1;
    results[g][b].pts+=1;
  }

  playedMatches[id]=true;

  document.getElementById(id+"a").disabled=true;
  document.getElementById(id+"b").disabled=true;

  let btn=document.getElementById("btn"+id);
  btn.disabled=true;
  btn.classList.add("locked");

  updateTable();
}

/* ======================
   NEXT MATCHDAY
====================== */
function nextDay(){
  if(md<2){
    md++;
    renderMatches();
  }else{
    md++;
    document.getElementById("matches").innerHTML="";
    alert("Group stage complete!");
  }
}

/* ======================
   TABLE
====================== */
function updateTable(){
  let t=document.getElementById("table");

  t.innerHTML="<tr><th>Group</th><th>Team</th><th>Pts</th><th>GD</th></tr>";

  for(let g in results){
    t.innerHTML+=`<tr><td colspan="4"><b>Group ${g}</b></td></tr>`;

    let sorted=Object.entries(results[g])
      .sort((a,b)=>b[1].pts-a[1].pts || b[1].gd-a[1].gd);

    sorted.forEach((p,i)=>{
      let d=p[1];

      t.innerHTML+=`
        <tr class="${i<2?'good':''}">
          <td></td>
          <td>
            <div class="playerCard">
              <img src="https://flagcdn.com/w40/${d.code}.png">
              <div class="playerName">${d.name}</div>
            </div>
          </td>
          <td>${d.pts}</td>
          <td>${d.gd}</td>
        </tr>
      `;
    });
  }
}

/* ======================
   TOP 8
====================== */
function getTop8(){
  let all=[];
  for(let g in results){
    let sorted=Object.entries(results[g])
      .sort((a,b)=>b[1].pts-a[1].pts || b[1].gd-a[1].gd);

    all.push(sorted[0][1]);
    all.push(sorted[1][1]);
  }
  return all;
}

/* ======================
   KNOCKOUT FLOW
====================== */
function generateQuarterFinals(){

  let top8=getTop8();

  qfMatches=[
    [top8[0],top8[1]],
    [top8[2],top8[3]],
    [top8[4],top8[5]],
    [top8[6],top8[7]]
  ];

  renderKO("🏆 QUARTER FINALS",qfMatches,"qf");
}

function renderKO(title,matches,stage){

  let k=document.getElementById("ko");

  let html=`<div class="group"><h3>${title}</h3>`;

  matches.forEach((m,i)=>{

    html+=`
      <div class="matchRow">

        <div class="playerCard">
          <img src="https://flagcdn.com/w40/${m[0].code}.png">
          <div class="playerName">${m[0].name}</div>
        </div>

        <input id="${stage+i}a">
        -
        <input id="${stage+i}b">

        <div class="playerCard">
          <img src="https://flagcdn.com/w40/${m[1].code}.png">
          <div class="playerName">${m[1].name}</div>
        </div>

        <button onclick="playKO('${stage}',${i})">✔</button>

      </div>
    `;
  });

  html+="</div>";
  k.innerHTML=html;
}

function playKO(stage,i){

  let a=document.getElementById(stage+i+"a");
  let b=document.getElementById(stage+i+"b");

  let x=parseInt(a.value);
  let y=parseInt(b.value);

  if(isNaN(x)||isNaN(y)) return;

  let match;

  if(stage==="qf") match=qfMatches[i];
  if(stage==="sf") match=sfMatches[i];
  if(stage==="final") match=finalMatch;

  let winner=x>y?match[0]:match[1];

  a.disabled=true;
  b.disabled=true;
  event.target.disabled=true;

  if(stage==="qf"){
    sfWinners.push(winner);
    if(sfWinners.length===4) generateSemiFinals();
  }

  else if(stage==="sf"){
    finalWinners.push(winner);
    if(finalWinners.length===2) generateFinal();
  }

  else{
    alert("🏆 CHAMPION: "+winner.name);
  }
}

function generateSemiFinals(){
  sfMatches=[
    [sfWinners[0],sfWinners[1]],
    [sfWinners[2],sfWinners[3]]
  ];
  renderKO("🟡 SEMI FINALS",sfMatches,"sf");
}

function generateFinal(){
  finalMatch=[
    finalWinners[0],
    finalWinners[1]
  ];
  renderKO("🔴 FINAL",finalMatch,"final");
}

</script>

</body>
</html>
